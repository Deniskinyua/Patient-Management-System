
services:
  app:
    build: pmsmodule
    container_name: patient-service-api
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_REDIS_HOST: redis
    networks:
      - pms-network

  postgres:
    image: postgres:16
    container_name: patient-service-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - pms-network

  redis:
    image: redis:7.4.2
    container_name: patient-service-redis
    ports:
      - "6379:6379"
    networks:
      - pms-network

networks:
  pms-network:
    driver: bridge