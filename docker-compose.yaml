
services:

  pms-service:
    build: pmsmodule
    container_name: patient-service-api
    #ports:
      #- "4000:4000"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patient_management_system
      SPRING_DATASOURCE_USERNAME:  #${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD:  #${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: redis
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

    networks:
      - pms-network

  billing-service:
      build: Billing-Service
      container_name: billing-service-api
      ports:
        - "4001:4001"
        - "9001:9001"
      depends_on:
        - pms-service
      networks:
        - pms-network
  analytics-service:
    build: AnalyticsService
    container_name: analytics-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "4002:4002"
    depends_on:
      - pms-service
    networks:
      - pms-network

  postgres:
    image: postgres:16
    container_name: patient-service-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: patient_management_system
      POSTGRES_USER:  #${POSTGRES_USER}
      POSTGRES_PASSWORD:   #${POSTGRES_PASSWORD}
    volumes:
      - ./pmsmodule/src/main/resources/data.sql:/docker-entrypoint-initdb.d/data.sql
    networks:
      - pms-network

  redis:
    image: redis:7.4.2
    container_name: patient-service-redis
    ports:
      - "6379:6379"
    networks:
      - pms-network

  kafka:
    image: 'bitnami/kafka:latest'
    container_name: kafka-pms

    ports:
      - "9092:9092"
      - "9094:9094"
    networks:
      - pms-network
    environment:
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    build:
      context: ./api-gateway
    ports:
      - "4004:4004"
    depends_on:
      - pms-service
    networks:
      - pms-network


networks:
  pms-network:
    driver: bridge